# SPEC LINK: docs/specs/03-mobile/91_mobile_lead_feed.md §3.5 item 5 (Cycle 7 Maestro)
#            docs/specs/03-mobile/94_mobile_onboarding.md §4 Path R (Realtor)
#            docs/specs/02-web-admin/76_lead_feed_health_dashboard.md (WF1 #C parent task)
#
# Maestro E2E: Realtor end-to-end — onboarding → non-empty feed → save → flight-board → unsave.
# Closes Spec 91 §3.5 item 5; depends on WF3 #realtor-backfill (commit 1967733)
# having populated permit_trades for the realtor trade_id so the feed query
# returns rows.
#
# Pre-WF3-realtor-backfill (2026-05-11) this flow would have failed at the
# "assert lead card visible" step because permit_trades had zero realtor
# rows. With the backfill registered in the permits chain at step 14 and
# 219,564 realtor rows live in the dev DB, the feed query returns leads
# and this flow can assert end-to-end realtor coverage.
#
# Account setup (R0 Gemini CRITICAL — was unspecified). Option A self-
# contained: the flow walks fresh onboarding path R inside the test, no
# external DB seed required. If the Expo dev build's onboarding path
# breaks under Maestro automation in CI, fall back to Option B (a
# `scripts/seed-realtor-test-account.js` that pre-creates a known
# realtor account; the flow signs into that instead).
appId: com.buildo.app
---
- launchApp:
    clearState: true

# ─── Onboarding Path R (Realtor) ───────────────────────────────────────
# Per Spec 94 §3.1 trade list + §4 Path R, the realtor entry is in the
# trade picker under its own grouping. Tap-through expects label
# "Real Estate Agent" (matches mobile/src/lib/onboarding/tradeData.ts:76).
- assertVisible: "What's your trade?"
- scrollDown
- scrollDown
# Realtor is typically near the bottom of the trade picker — may need
# additional scrolls depending on category-group expansion state.
- tapOn: "Real Estate Agent"

# Confirm trade lock sheet
- assertVisible: "Continue"
- tapOn: "Continue"
- assertVisible: "Confirm"
- tapOn: "Confirm"

# Path selection — realtor maps to "Find New Leads" path (Spec 94 §4 Path R)
- assertVisible: "Find New Leads"
- tapOn: "Find New Leads"

# Address — realtor default is home-base-fixed per Spec 95 §6 (toggle not shown).
# Expected: address input sheet opens directly.
- assertVisible: "Your home base"
- inputText: "100 Queen St W, Toronto, ON"
- tapOn: "Continue"

# Supplier screen — skip (Spec 95 §2.2 lead_views, n/a for realtors)
- assertVisible: "Skip for now"
- tapOn: "Skip for now"

# ToS / Privacy
- assertVisible: "Terms & Privacy"
- tapOn:
    id: "tos-checkbox"
- tapOn:
    id: "privacy-checkbox"
- tapOn: "Accept & Continue"

# Onboarding complete
- assertVisible: "See your leads"
- tapOn: "See your leads"

# ─── Feed — assert non-empty (the WF3 #realtor-backfill payoff) ─────────
# Pre-WF3-realtor-backfill (commit 1967733) this assertion would fail:
# permit_trades had 0 realtor rows so getLeadFeed({trade_slug:'realtor'})
# returned an empty array. Post-backfill, ~68,787 realtor-eligible active
# permits are covered so at least one card renders.
- assertVisible: "Lead Feed"
# Sanity check: at least one lead card has a permit ID rendered.
# Permit IDs follow "YY NNNNNN XXX" format from Spec 91 §4.1.
- assertVisible:
    text: ".*\\d{2}\\s+\\d{6}\\s+[A-Z]{3}.*"
    enabled: true

# ─── Save a lead → flight-board → unsave (clean state) ─────────────────
# Tap the first visible permit card. Detail screen should render.
- tapOn:
    text: ".*\\d{2}\\s+\\d{6}\\s+[A-Z]{3}.*"
    index: 0
- assertVisible: "Save"

# Save the lead. SaveButton flips to "Saved" optimistically per Spec 91 §4.3.
- tapOn: "Save"
- assertVisible: "Saved"

# Navigate back to feed, then to flight-board.
- back
- tapOn:
    id: "tab-flight-board"
- assertVisible: "Flight Board"
# The just-saved lead must appear in the flight-board's saved section.
- assertVisible:
    text: ".*\\d{2}\\s+\\d{6}\\s+[A-Z]{3}.*"
    enabled: true

# Tap the saved card to open detail; unsave to leave the DB clean.
- tapOn:
    text: ".*\\d{2}\\s+\\d{6}\\s+[A-Z]{3}.*"
    index: 0
- tapOn: "Saved"
- assertVisible: "Save"
