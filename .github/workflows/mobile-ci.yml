name: Mobile CI

on:
  pull_request:
    paths:
      - 'mobile/**'
  push:
    branches: [main]
    paths:
      - 'mobile/**'

jobs:
  unit-tests:
    name: Jest + TypeCheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run test:ci

  maestro-ios:
    name: Maestro E2E (iOS Simulator)
    runs-on: macos-15
    needs: unit-tests
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Install Maestro CLI
        run: curl -Ls "https://get.maestro.mobile.dev" | bash
      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 16" || true
          xcrun simctl bootstatus "iPhone 16" -b
      - name: Run Maestro flows
        run: ~/.maestro/bin/maestro test maestro/ --format junit --output maestro-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results
          path: mobile/maestro-results.xml

  eas-update:
    name: EAS Update (OTA)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci --legacy-peer-deps
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: EAS Update
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
