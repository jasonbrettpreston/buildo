name: DB Integration Tests

# Real-Postgres integration tests for the bug class that mocked-pool tests
# can't catch: SQL syntax, constraint violations, FK cascades, geography
# casts, column width truncation. Runs in parallel with the standard test
# job. See docs/specs/00_engineering_standards.md §12.9.

on:
  pull_request:
    paths:
      - 'migrations/**'
      - 'src/features/leads/lib/**'
      - 'src/lib/db/**'
      - 'src/tests/db/**'
      - 'scripts/migrate.js'
      - '.github/workflows/db-tests.yml'
  push:
    branches: [main]

jobs:
  db-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: buildo
          POSTGRES_PASSWORD: buildo
          POSTGRES_DB: buildo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U buildo -d buildo_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://buildo:buildo@localhost:5432/buildo_test
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: buildo
      PG_PASSWORD: buildo
      PG_DATABASE: buildo_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U buildo && break
            sleep 1
          done

      - name: Run DB integration tests
        run: npm run test:db
